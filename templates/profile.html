<!DOCTYPE html>
<html>
<head>
    <title>Профиль | Мессенджер</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="profile-container">
        <h2>Редактирование профиля</h2>
        <form method="POST" enctype="multipart/form-data">
            <div class="profile-pic">
                <img src="/static/uploads/{{ user.profile_picture }}" width="100">
            </div>
            <label>Имя пользователя:</label>
            <input type="text" name="username" value="{{ user.username }}">
            <label>Статус:</label>
            <input type="text" name="status" value="{{ user.status }}">
            <label>Фото профиля:</label>
            <input type="file" name="profile_picture">
            <button type="submit">Сохранить</button>
        </form>
        <p>Ваш уникальный ID: <strong>{{ user.unique_id }}</strong> (неизменяемый)</p>
        <a href="/chat">Назад в чат</a>
    </div>
</body>
</html>
